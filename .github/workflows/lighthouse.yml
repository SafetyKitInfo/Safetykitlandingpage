name: Lighthouse CI

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Start production server
        run: |
          nohup npm run start &
          sleep 2

      - name: Wait for localhost
        run: npx wait-on http://localhost:3000 --timeout 60_000

      - name: Run Lighthouse (CLI)
        if: always()
        run: |
          mkdir -p lighthouse-report
          npx -y lighthouse http://localhost:3000 --output html --output json --output-path=./lighthouse-report/report --chrome-flags="--no-sandbox --headless"

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-report
