name: Lighthouse CI

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Start production server
        run: |
          nohup npm run start &
          sleep 2

      - name: Wait for localhost
        run: npx wait-on http://localhost:3000 --timeout 60_000

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v8
        with:
          urls: http://localhost:3000
          output: html,json
          uploadArtifacts: false
          configPath: ''

      - name: Collect reports
        if: always()
        run: |
          mkdir -p lighthouse-report || true
          mv *.report.html lighthouse-report/ 2>/dev/null || true
          mv *.report.json lighthouse-report/ 2>/dev/null || true

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-report
